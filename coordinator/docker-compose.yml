services:
  coordinator:
    image: citusdata/citus:12.1
    container_name: coordinator_r3tr0

    restart: unless-stopped

    ports:
      - "35567:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delivery_db

    volumes:
      - coordinator_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ../datos:/datos-csv

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivery_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../app-backend
      dockerfile: Dockerfile

    container_name: delivery_backend

    restart: unless-stopped

    depends_on:
      coordinator:
        condition: service_healthy

    ports:
      - "5000:5000"

    environment:
      DB_HOST: coordinator
      DB_PORT: 5432
      DB_NAME: delivery_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      FLASK_PORT: 5000

  pgadmin:
    image: dpage/pgadmin4
    container_name: delivery_pgadmin

    restart: unless-stopped

    depends_on:
      coordinator:
        condition: service_healthy

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "8080:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  coordinator_data:
  pgadmin_data: